<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI นับปลา: ระบบประมวลผลแม่นยำ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffcc; 
            --bg-body: #0a0e17; 
            --bg-card: #161b22; 
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --error: #ff3366;
            --warning: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 { 
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .app-card { 
            background-color: var(--bg-card);
            border: 1px solid #30363d;
            border-radius: 16px; 
            width: 100%;
            max-width: 500px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        .upload-section {
            margin-bottom: 20px;
        }

        input[type="file"] {
            width: 100%;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            font-family: 'Kanit', sans-serif;
        }

        .image-container {
            margin-top: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            display: none; 
            border: 2px solid var(--primary);
        }
        
        .image-container.active {
            display: block;
        }

        img#preview { 
            width: 100%; 
            display: block;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-submit { 
            background: var(--primary);
            color: #0a0e17; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-clear {
            background: transparent;
            color: var(--error);
            padding: 12px;
            border: 1px solid var(--error);
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-submit:disabled, .btn-clear:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-container {
            margin-top: 25px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            border-radius: 12px;
            background-color: var(--bg-card);
            border: 1px solid #30363d;
            display: none; 
            text-align: center;
        }

        .result-container.active {
            display: block;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #0a0e17;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>🐟 AI ตรวจนับลูกปลา</h1>
        <p>ถ่ายรูปหรือเลือกรูปภาพเพื่อเริ่มการประมวลผล</p>
    </header>

    <div class="app-card">
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*" capture="environment" onchange="previewImage(event)">
        </div>

        <div id="imageWrapper" class="image-container">
            <img id="preview" alt="ตัวอย่างรูปภาพ">
        </div>

        <div class="btn-group">
            <button id="submitBtn" class="btn-submit" onclick="sendToAI()">
                <div id="btnSpinner" class="spinner"></div>
                <span id="btnText">เริ่มประมวลผล</span>
            </button>
            
            <button id="clearBtn" class="btn-clear" onclick="clearImage()">
                🗑️ ล้างรูปภาพและผลลัพธ์
            </button>
        </div>
    </div>

    <div id="resultWrapper" class="result-container">
        <h2 id="result"></h2>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const imageWrapper = document.getElementById('imageWrapper');
        const resultWrapper = document.getElementById('resultWrapper');
        const resultText = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                preview.src = reader.result;
                imageWrapper.classList.add('active');
                resultWrapper.classList.remove('active');
            }
            reader.readAsDataURL(file);
        }

        function clearImage() {
            imageInput.value = ""; 
            preview.src = ""; 
            imageWrapper.classList.remove('active');
            resultWrapper.classList.remove('active');
            resultText.innerText = "";
            btnText.innerText = "เริ่มประมวลผล";
            submitBtn.disabled = false;
        }

        async function sendToAI() {
            if (imageInput.files.length === 0) {
                alert("กรุณาเลือกรูปภาพก่อนครับ");
                return;
            }

            submitBtn.disabled = true;
            btnSpinner.style.display = "block";
            btnText.innerText = "กำลังประมวลผล...";
            
            resultWrapper.classList.add('active');
            resultText.innerText = "ระบบกำลังวิเคราะห์ข้อมูล...";
            resultText.style.color = "var(--warning)";

            const formData = new FormData();
            formData.append("file", imageInput.files[0]);

            try {
                const response = await fetch("https://fish-ai-backend.onrender.com/predict", {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                
                if(data.status === "success") {
                    resultText.innerText = "✅ " + data.message;
                    resultText.style.color = "var(--primary)";
                    if (data.image_base64) {
                        preview.src = "data:image/jpeg;base64," + data.image_base64;
                    }
                } else {
                    resultText.innerText = "❌ เกิดข้อผิดพลาด: " + data.message;
                    resultText.style.color = "var(--error)";
                }
            } catch (error) {
                resultText.innerText = "❌ ไม่สามารถติดต่อเซิร์ฟเวอร์ได้";
                resultText.style.color = "var(--error)";
            } finally {
                submitBtn.disabled = false;
                btnSpinner.style.display = "none";
                btnText.innerText = "เริ่มประมวลผล";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI นับปลา: ส่องปั๊บ รู้ปุ๊บ!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffcc; /* สีเขียวหลัก */
            --primary-dark: #00ccaa; /* สีเขียวเข้มตอนโฮเวอร์ */
            --bg-body: #0a0e17; /* สีพื้นหลังเว็บเข้มสนิท */
            --bg-card: #161b22; /* สีพื้นหลังกล่อง */
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --error: #ff3366;
            --warning: #ffcc00;
            --shadow: 0 8px 30px rgba(0,0,0,0.5);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* ส่วนหัวเว็บ */
        header {
            margin-bottom: 30px;
            margin-top: 20px;
        }

        h1 { 
            font-weight: 700;
            font-size: 2.2rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0,255,204,0.5);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        header p {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 1rem;
        }

        /* กล่องหลักของแอป */
        .app-card { 
            background-color: var(--bg-card);
            border: 1px solid #30363d;
            border-radius: 16px; 
            width: 100%;
            max-width: 500px;
            padding: 30px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .app-card:hover {
            border-color: var(--primary);
        }

        /* ปรับแต่งปุ่มเลือกไฟล์แบบดั้งเดิมให้ดูดี */
        .upload-section {
            margin-bottom: 20px;
            text-align: left;
        }

        .upload-label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 400;
            font-size: 0.9rem;
        }

        input[type="file"] {
            width: 100%;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #30363d;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
        }

        input[type="file"]::-webkit-file-upload-button {
            background: #21262d;
            color: var(--text-main);
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            font-family: 'Kanit', sans-serif;
            transition: var(--transition);
        }

        input[type="file"]::-webkit-file-upload-button:hover {
            background: #30363d;
        }

        /* ส่วนแสดงรูปภาพ */
        .image-container {
            position: relative;
            margin-top: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            min-height: 100px;
            display: none; /* ซ่อนไว้ก่อน */
            border: 2px solid #30363d;
            transition: var(--transition);
        }
        
        .image-container.active {
            display: block;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0,255,204,0.2);
        }

        img#preview { 
            width: 100%; 
            height: auto;
            display: block;
        }

        /* ปุ่มกดหลัก */
        .btn-submit { 
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #00e6b8 100%);
            color: #0a0e17; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 18px; 
            cursor: pointer; 
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,255,204,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,255,204,0.5);
        }

        .btn-submit:active:not(:disabled) { 
            transform: translateY(1px);
        }

        .btn-submit:disabled {
            background: #30363d;
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ส่วนแสดงผลลัพธ์ */
        .result-container {
            margin-top: 30px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            border-radius: 12px;
            background-color: var(--bg-card);
            border: 1px solid #30363d;
            display: none; /* ซ่อนไว้ก่อน */
            transition: var(--transition);
        }

        .result-container.active {
            display: block;
            animation: slideUp 0.5s ease;
        }

        h2#result {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0;
            word-wrap: break-word;
        }

        /* สไตล์ไอคอนโหลด (Loading Spinner) */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(10,14,23,0.3);
            border-radius: 50%;
            border-top-color: #0a0e17;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ปรับแต่งสำหรับมือถือ */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .app-card { padding: 20px; }
            .btn-submit { font-size: 16px; padding: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🐟 AI ตรวจนับลูกปลา 🚀</h1>
        <p>ถ่ายรูปจากกะละมัง หรืออัปโหลดรูปปลาเลยลูกพี่!</p>
    </header>

    <div class="app-card">
        <div class="upload-section">
            <label for="imageInput" class="upload-label">เลือกรูปภาพของคุณ</label>
            <input type="file" id="imageInput" accept="image/*" capture="environment" onchange="previewImage(event)">
        </div>

        <div id="imageWrapper" class="image-container">
            <img id="preview" alt="ตัวอย่างรูปภาพ">
        </div>

        <button id="submitBtn" class="btn-submit" onclick="sendToAI()">
            <div id="btnSpinner" class="spinner"></div>
            <span id="btnText">🔥 ส่งให้ AI ประมวลผล</span>
        </button>
    </div>

    <div id="resultWrapper" class="result-container">
        <h2 id="result"></h2>
    </div>

    <script>
        // ฟังก์ชันโชว์รูปต้นฉบับก่อนส่ง
        function previewImage(event) {
            const reader = new FileReader();
            const file = event.target.files[0];

            if (!file) return;

            reader.onload = function() {
                const imgElement = document.getElementById('preview');
                const imageWrapper = document.getElementById('imageWrapper');
                const resultWrapper = document.getElementById('resultWrapper');
                
                imgElement.src = reader.result;
                imageWrapper.classList.add('active'); // โชว์กรอบรูป
                
                // เคลียร์ผลลัพธ์เก่า
                resultWrapper.classList.remove('active');
                document.getElementById('result').innerText = ""; 
            }
            reader.readAsDataURL(file);
        }

        // ฟังก์ชันส่งรูปไปให้ Backend
        async function sendToAI() {
            const fileInput = document.getElementById('imageInput');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const resultText = document.getElementById('result');
            const resultWrapper = document.getElementById('resultWrapper');
            const imgElement = document.getElementById('preview');

            if (fileInput.files.length === 0) {
                alert("เฮ้ยพี่! ใส่รูปปลาก่อนดิ!");
                return;
            }

            // --- เริ่มสถานะ Loading (UI ใหม่) ---
            submitBtn.disabled = true;
            btnSpinner.style.display = "block";
            btnText.innerText = "กำลังคิด...";
            
            // เตรียมหน้าต่างผลลัพธ์
            resultWrapper.classList.add('active');
            resultText.innerText = "🧐 AI กำลังเพ่งตาแตก รอแป๊บนะพี่...";
            resultText.style.color = "var(--warning)";

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                // ลิงก์ Render ถูกต้องเป๊ะแล้ว!
                const backendURL = "https://fish-ai-backend.onrender.com/predict"; 

                const response = await fetch(backendURL, {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                
                if(data.status === "success") {
                    // 🎉 สำเร็จ! โชว์จำนวนปลาแบบเฟี้ยวๆ
                    resultText.innerText = "✅ " + data.message;
                    resultText.style.color = "var(--primary)";
                    
                    // เช็คว่าถ้าหลังบ้านส่งรูปตีกรอบ (Base64) กลับมา ถึงจะโชว์รูป
                    if (data.image_base64) {
                        imgElement.src = "data:image/jpeg;base64," + data.image_base64;
                    }
                } else {
                    // ❌ ถ้าหลังบ้านแจ้งว่า Error (แต่ติดต่อได้นะ)
                    const realError = data.message || JSON.stringify(data);
                    resultText.innerText = "❌ พังง่ะ (โค้ดหลังบ้านบึ้ม): " + realError;
                    resultText.style.color = "var(--error)";
                }
            } catch (error) {
                // 🚨 แก้บั๊กตรงนี้: ถ้าติดต่อ Render ไม่ได้ หรือเน็ตหลุด ให้พ่น error.message ออกมา
                console.error("Fetch Error:", error);
                resultText.innerText = "❌ ติดต่อหลังบ้านไม่ได้! (เซิร์ฟอาจจะหลับ/ตื่นสาย): " + error.message;
                resultText.style.color = "var(--error)";
            } finally {
                // --- จบสถานะ Loading ---
                submitBtn.disabled = false;
                btnSpinner.style.display = "none";
                btnText.innerText = "🔥 ส่งให้ AI ประมวลผล";
            }
        }
    </script>
</body>
</html>

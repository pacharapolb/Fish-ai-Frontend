<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI นับปลา</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0ea5e9;
            --primary-light: #e0f2fe;
            --primary-dark: #0284c7;
            --accent: #06b6d4;
            --success: #10b981;
            --success-light: #d1fae5;
            --error: #ef4444;
            --error-light: #fee2e2;
            --warning: #f59e0b;
            --bg-body: #f0f9ff;
            --bg-card: #ffffff;
            --bg-subtle: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(14, 165, 233, 0.10);
            --shadow-hover: 0 8px 32px rgba(14, 165, 233, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg-body);
            background-image:
                radial-gradient(circle at 20% 10%, #bae6fd55 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #a5f3fc44 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeDown 0.6s ease both;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary-light);
            color: var(--primary-dark);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 99px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
            margin-bottom: 10px;
        }

        h1 span {
            color: var(--primary);
        }

        header p {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 300;
        }

        /* Card */
        .app-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 28px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.6s ease 0.1s both;
            transition: box-shadow 0.3s;
        }

        .app-card:hover {
            box-shadow: var(--shadow-hover);
        }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: var(--bg-subtle);
            position: relative;
            margin-bottom: 20px;
        }

        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .upload-zone p {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 400;
        }

        .upload-zone strong {
            color: var(--primary);
            font-weight: 600;
        }

        /* Preview */
        .image-container {
            display: none;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--primary-light);
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 2px 12px rgba(14,165,233,0.10);
        }

        .image-container.active { display: block; }

        .image-container img {
            width: 100%;
            display: block;
        }

        .image-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.92);
            color: var(--primary-dark);
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 99px;
            backdrop-filter: blur(4px);
            border: 1px solid var(--border);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(14,165,233,0.35);
            letter-spacing: 0.3px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14,165,233,0.40);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-clear {
            background: transparent;
            color: var(--error);
            padding: 11px;
            border: 1.5px solid #fca5a5;
            border-radius: 14px;
            font-weight: 500;
            font-size: 14px;
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-clear:hover:not(:disabled) {
            background: var(--error-light);
            border-color: var(--error);
        }

        .btn-submit:disabled, .btn-clear:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        /* Result */
        .result-container {
            display: none;
            width: 100%;
            max-width: 480px;
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
            animation: fadeUp 0.4s ease both;
            box-shadow: var(--shadow);
        }

        .result-container.active { display: block; }

        .result-header {
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .result-body {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 20px 20px;
            padding: 20px;
        }

        .result-body h2 {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.6;
        }

        .result-success .result-header {
            background: var(--success-light);
            color: #065f46;
            border: 1px solid #6ee7b7;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
        }

        .result-error .result-header {
            background: var(--error-light);
            color: #991b1b;
            border: 1px solid #fca5a5;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
        }

        .result-loading .result-header {
            background: #fef9c3;
            color: #92400e;
            border: 1px solid #fde68a;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 300;
            text-align: center;
            animation: fadeUp 0.6s ease 0.3s both;
        }

        footer span {
            color: var(--primary);
            font-weight: 500;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-badge">🐟 Powered by YOLOv8</div>
        <h1>ระบบ<span>ตรวจนับ</span>ลูกปลา</h1>
        <p>อัปโหลดภาพเพื่อให้ AI นับจำนวนลูกปลาให้อัตโนมัติ</p>
    </header>

    <div class="app-card">
        <div class="upload-zone" id="uploadZone">
            <input type="file" id="imageInput" accept="image/*" capture="environment" onchange="previewImage(event)">
            <span class="upload-icon">📷</span>
            <p><strong>คลิกเพื่อเลือกภาพ</strong> หรือลากวางที่นี่</p>
            <p style="margin-top:6px; font-size:13px;">รองรับไฟล์ JPG, PNG</p>
        </div>

        <div id="imageWrapper" class="image-container">
            <span class="image-label">📌 ภาพที่เลือก</span>
            <img id="preview" alt="ตัวอย่างรูปภาพ">
        </div>

        <div class="btn-group">
            <button id="submitBtn" class="btn-submit" onclick="sendToAI()">
                <div id="btnSpinner" class="spinner"></div>
                <span id="btnText">🔍 เริ่มประมวลผล</span>
            </button>
            <button id="clearBtn" class="btn-clear" onclick="clearImage()">
                🗑️ ล้างรูปภาพและผลลัพธ์
            </button>
        </div>
    </div>

    <div id="resultWrapper" class="result-container">
        <div class="result-header" id="resultHeader">ผลลัพธ์</div>
        <div class="result-body">
            <h2 id="result"></h2>
        </div>
    </div>

    <footer>
        พัฒนาโดยนักศึกษา &nbsp;·&nbsp; Deploy บน <span>Vercel</span> & <span>Render</span>
    </footer>

    <script>
        const imageInput   = document.getElementById('imageInput');
        const preview      = document.getElementById('preview');
        const imageWrapper = document.getElementById('imageWrapper');
        const resultWrapper= document.getElementById('resultWrapper');
        const resultText   = document.getElementById('result');
        const resultHeader = document.getElementById('resultHeader');
        const submitBtn    = document.getElementById('submitBtn');
        const btnText      = document.getElementById('btnText');
        const btnSpinner   = document.getElementById('btnSpinner');
        const uploadZone   = document.getElementById('uploadZone');

        // Drag & drop highlight
        uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
        uploadZone.addEventListener('drop', e => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) { imageInput.files = e.dataTransfer.files; previewFile(file); }
        });

        function previewFile(file) {
            const reader = new FileReader();
            reader.onload = () => {
                preview.src = reader.result;
                imageWrapper.classList.add('active');
                uploadZone.style.display = 'none';
                resultWrapper.classList.remove('active');
            };
            reader.readAsDataURL(file);
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) previewFile(file);
        }

        function clearImage() {
            imageInput.value = '';
            preview.src = '';
            imageWrapper.classList.remove('active');
            uploadZone.style.display = '';
            resultWrapper.classList.remove('active');
            resultText.innerText = '';
            btnText.innerText = '🔍 เริ่มประมวลผล';
            submitBtn.disabled = false;
        }

        function setResult(type, header, message) {
            resultWrapper.className = 'result-container active result-' + type;
            resultHeader.innerText = header;
            resultText.innerText = message;
        }

        async function sendToAI() {
            if (!imageInput.files.length) { alert('กรุณาเลือกรูปภาพก่อนครับ'); return; }

            submitBtn.disabled = true;
            btnSpinner.style.display = 'block';
            btnText.innerText = 'กำลังประมวลผล...';
            setResult('loading', '⏳ กำลังวิเคราะห์...', 'ระบบกำลังประมวลผลภาพ กรุณารอสักครู่');

            const formData = new FormData();
            formData.append('file', imageInput.files[0]);

            try {
                const response = await fetch('https://fish-ai-backend.onrender.com/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    setResult('success', '✅ ผลลัพธ์', data.message);
                    if (data.image_base64) {
                        preview.src = 'data:image/jpeg;base64,' + data.image_base64;
                    }
                } else {
                    setResult('error', '❌ เกิดข้อผิดพลาด', data.message);
                }
            } catch (error) {
                setResult('error', '❌ เกิดข้อผิดพลาด', 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง');
            } finally {
                submitBtn.disabled = false;
                btnSpinner.style.display = 'none';
                btnText.innerText = '🔍 เริ่มประมวลผล';
            }
        }
    </script>
</body>
</html>
